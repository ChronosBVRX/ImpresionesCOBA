<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Automático de Gang Sheets</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        /* Diseño Visual e Intuitivo (CSS Completo) */
        :root {
            --primary-color: #f59e0b; 
            --primary-hover: #d97706;
            --secondary-color: #10b981; 
            --secondary-hover: #059669;
            --danger-color: #ef4444; 
            --danger-hover: #dc2626;
            --bg-color: #111827;
            --panel-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
            height: fit-content;
        }

        /* Panel de Controles a la izquierda */
        .controls-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .controls-panel h2, .controls-panel h3 {
            margin-top: 0;
            margin-bottom: 5px;
            color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .form-group input[type="text"], 
        .form-group input[type="number"], 
        .form-group select {
            padding: 8px 10px;
            background-color: #374151;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        .form-group input[type="color"] {
            width: 100%;
            height: 35px;
            padding: 2px;
            background-color: #374151;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
        }

        .form-group input[type="file"] {
            padding: 8px;
            background-color: #374151;
            border: 1px dashed var(--primary-color);
            border-radius: 6px;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }

        .dimensions-container {
            display: flex;
            gap: 10px;
            background-color: #111827;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .dimensions-container .form-group { flex: 1; }

        /* Botones del panel izquierdo */
        .btn-add {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add:hover { background-color: var(--secondary-hover); }

        .btn-auto {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(245, 158, 11, 0.3);
        }
        .btn-auto:hover { background-color: var(--primary-hover); transform: translateY(-2px); }

        .btn-clear {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 8px;
            font-size: 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear:hover { background-color: rgba(239, 68, 68, 0.1); }

        .btn-exportar-png, .btn-exportar-svg {
            background-color: #374151;
            color: white;
            border: 1px solid #4b5563;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-exportar-png:hover, .btn-exportar-svg:hover { background-color: #4b5563; }

        /* Lista de Pendientes (Cola de impresión) */
        .queue-container {
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1f2937;
            padding: 5px 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            border-left: 3px solid var(--primary-color);
        }

        /* Panel de Vista Previa a la derecha */
        .preview-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        /* NUEVO: Estilo para el botón de limpiar lienzo */
        .btn-clear-canvas {
            background-color: transparent;
            color: #9ca3af;
            border: 1px solid #4b5563;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-clear-canvas:hover {
            background-color: #374151;
            color: white;
            border-color: #6b7280;
        }

        .canvas-header p {
            margin: 0;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .status-message {
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 0.9rem;
            display: block;
            margin-top: 5px;
        }

        .canvas-container {
            background-image: 
                linear-gradient(45deg, #1f2937 25%, transparent 25%), 
                linear-gradient(-45deg, #1f2937 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1f2937 75%), 
                linear-gradient(-45deg, transparent 75%, #1f2937 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #111827; 
            border: 1px solid #4b5563;
            display: flex;
            position: relative;
            height: 80vh; 
            aspect-ratio: 57 / 112; 
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        #svg-workspace {
            width: 100%;
            height: 100%;
            display: block;
        }

        .draggable-text {
            cursor: grab;
            user-select: none;
        }
        .draggable-text:active { cursor: grabbing; }
        .draggable-text:hover { opacity: 0.8; }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; }
            .controls-panel { width: auto; }
            .canvas-container { height: 60vh; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="controls-panel">
            <h2>1. Configurar Rollo</h2>
            <div class="dimensions-container">
                <div class="form-group">
                    <label>Ancho (cm):</label>
                    <input type="number" id="ancho-input" value="57" min="1" step="1" onchange="actualizarLienzo()">
                </div>
                <div class="form-group">
                    <label>Alto (cm):</label>
                    <input type="number" id="alto-input" value="112" min="1" step="1" onchange="actualizarLienzo()">
                </div>
            </div>

            <h2>2. Preparar Elementos</h2>
            
            <div class="form-group">
                <label>Texto (Número o Nombre):</label>
                <input type="text" id="texto-input" value="10" placeholder="Ej. 10 o RODRIGUEZ">
            </div>

            <div class="dimensions-container">
                <div class="form-group" style="flex: 2;">
                    <label style="color: var(--primary-color);">Cargar Fuente (.ttf):</label>
                    <input type="file" id="font-upload" accept=".ttf, .otf, .woff, .woff2">
                </div>
                <div class="form-group" style="flex: 3;">
                    <label>Tipografía:</label>
                    <select id="fuente-select">
                        <option value="'Anton', sans-serif">Anton</option>
                        <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                    </select>
                </div>
            </div>

            <div class="dimensions-container">
                <div class="form-group">
                    <label>Alto Texto (cm):</label>
                    <input type="number" id="alto-numero-input" value="22" min="1" step="0.5">
                </div>
                <div class="form-group">
                    <label>Color:</label>
                    <input type="color" id="color-input" value="#ffffff">
                </div>
                <div class="form-group">
                    <label>¿Cuántos?:</label>
                    <input type="number" id="cantidad-input" value="1" min="1" step="1" style="background-color: #1f2937; border-color: var(--secondary-color);">
                </div>
            </div>

            <button class="btn-add" onclick="agregarACola()">↓ Añadir a la Cola de Producción</button>

            <div class="queue-container" id="queue-list">
                <div style="color: #6b7280; font-size: 0.85rem; text-align: center; padding: 10px;">La cola está vacía</div>
            </div>

            <h2>3. Generar y Exportar</h2>
            <button class="btn-auto" onclick="autoAcomodar()">⚡ Generar y Auto-Acomodar</button>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-clear" style="flex: 1;" onclick="vaciarCola()">🗑️ Vaciar Cola</button>
                <button class="btn-exportar-png" style="flex: 2;" onclick="descargarPNG()">💾 Descargar PNG</button>
            </div>
            <button class="btn-exportar-svg" style="margin-top: 10px;" onclick="descargarSVG()">💾 Mantener Exportación SVG</button>
        </div>

        <div class="preview-panel">
            <div class="canvas-header">
                <div>
                    <h2 style="margin: 0;">Lienzo Inteligente</h2>
                    <button class="btn-clear-canvas" onclick="limpiarLienzo()">🧹 Limpiar Lienzo</button>
                </div>
                <div style="text-align: right;">
                    <p id="medida-info">Plantilla: 57 cm x 112 cm</p>
                    <span id="status-info" class="status-message"></span>
                </div>
            </div>
            
            <div class="canvas-container" id="canvas-wrapper">
                <svg id="svg-workspace" xmlns="http://www.w3.org/2000/svg">
                    <defs id="svg-defs"></defs>
                    <g id="texto-container"></g>
                </svg>
            </div>
            <p style="color: #9ca3af; font-size: 0.85rem; margin-top: 10px;">* Una vez generados, puedes arrastrar los elementos con el ratón para aprovechar huecos. Doble clic para borrar uno.</p>
        </div>
    </div>

    <script>
        // Referencias principales
        const anchoInput = document.getElementById('ancho-input');
        const altoInput = document.getElementById('alto-input');
        const svgWorkspace = document.getElementById('svg-workspace');
        const textoContainer = document.getElementById('texto-container');
        const svgDefs = document.getElementById('svg-defs');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const medidaInfo = document.getElementById('medida-info');
        const queueList = document.getElementById('queue-list');
        const statusInfo = document.getElementById('status-info');

        let fuentesPersonalizadas = {};
        let colaProduccion = []; // Memoria para guardar los elementos antes de acomodarlos

        // 1. Configuración de pantalla
        function actualizarLienzo() {
            const anchoPlantillaCm = parseFloat(anchoInput.value) || 57;
            const altoPlantillaCm = parseFloat(altoInput.value) || 112;
            medidaInfo.textContent = `Plantilla: ${anchoPlantillaCm} cm x ${altoPlantillaCm} cm`;
            canvasWrapper.style.aspectRatio = `${anchoPlantillaCm} / ${altoPlantillaCm}`;
            const viewBoxAncho = anchoPlantillaCm * 100;
            const viewBoxAlto = altoPlantillaCm * 100;
            svgWorkspace.setAttribute('viewBox', `0 0 ${viewBoxAncho} ${viewBoxAlto}`);
        }

        // 2. Cargar Fuentes
        document.getElementById('font-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evento) {
                const base64Font = evento.target.result;
                const fontName = 'Fuente_' + Math.random().toString(36).substring(7);
                fuentesPersonalizadas[fontName] = base64Font;
                
                const newStyle = document.createElement('style');
                newStyle.appendChild(document.createTextNode(`@font-face { font-family: '${fontName}'; src: url('${base64Font}'); }`));
                document.head.appendChild(newStyle);

                const svgStyle = document.createElementNS("http://www.w3.org/2000/svg", "style");
                svgStyle.textContent = `@font-face { font-family: '${fontName}'; src: url('${base64Font}'); }`;
                svgDefs.appendChild(svgStyle);
                
                const select = document.getElementById('fuente-select');
                const option = document.createElement('option');
                option.value = `'${fontName}'`;
                option.textContent = '★ ' + file.name;
                option.style.fontFamily = fontName;
                select.appendChild(option);
                select.value = `'${fontName}'`;
            };
            reader.readAsDataURL(file);
        });

        // 3. Sistema de Cola de Producción
        function agregarACola() {
            const texto = document.getElementById('texto-input').value;
            const fuenteVal = document.getElementById('fuente-select').value;
            const altoTextoCm = parseFloat(document.getElementById('alto-numero-input').value);
            const colorTexto = document.getElementById('color-input').value;
            const cantidad = parseInt(document.getElementById('cantidad-input').value) || 1;

            if (!texto) { alert("Escribe un texto o número."); return; }

            colaProduccion.push({
                id: Date.now(),
                texto: texto,
                fuente: fuenteVal,
                altoCm: altoTextoCm,
                color: colorTexto,
                cantidad: cantidad
            });

            actualizarVistaCola();
        }

        function actualizarVistaCola() {
            if (colaProduccion.length === 0) {
                queueList.innerHTML = '<div style="color: #6b7280; font-size: 0.85rem; text-align: center; padding: 10px;">La cola está vacía</div>';
                return;
            }

            queueList.innerHTML = '';
            colaProduccion.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <span><b>${item.cantidad}x</b> "${item.texto}" (${item.altoCm}cm)</span>
                    <button style="background: none; border: none; color: #ef4444; cursor: pointer;" onclick="eliminarDeCola(${index})">✕</button>
                `;
                queueList.appendChild(div);
            });
        }

        function eliminarDeCola(index) {
            colaProduccion.splice(index, 1);
            actualizarVistaCola();
        }

        // NUEVA FUNCIÓN: Solo borra la lista de pedidos
        function vaciarCola() {
            colaProduccion = [];
            actualizarVistaCola();
        }

        // NUEVA FUNCIÓN: Solo borra el área visual de trabajo (El lienzo)
        function limpiarLienzo() {
            textoContainer.innerHTML = '';
            statusInfo.textContent = 'Lienzo en blanco.';
            statusInfo.style.color = '#9ca3af';
        }

        // 4. Motor de Acomodo Automático (Bin Packing)
        function autoAcomodar() {
            if (colaProduccion.length === 0) {
                alert("Añade elementos a la cola primero.");
                return;
            }

            // Limpiar lienzo previo antes de generar el nuevo
            limpiarLienzo();
            
            const anchoLienzoPx = (parseFloat(anchoInput.value) || 57) * 100;
            const altoLienzoPx = (parseFloat(altoInput.value) || 112) * 100;
            const margenPx = 50; 

            let posXActual = margenPx;
            let posYActual = margenPx;
            let alturaFilaMaxima = 0;
            
            let totalAcomodados = 0;
            let elementosNoCupieron = 0;

            colaProduccion.forEach(item => {
                const tamanoTextoPx = item.altoCm * 100;

                for (let i = 0; i < item.cantidad; i++) {
                    const textoNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    textoNode.textContent = item.texto;
                    textoNode.setAttribute('fill', item.color); 
                    textoNode.setAttribute('font-family', item.fuente);
                    textoNode.setAttribute('font-size', `${tamanoTextoPx}px`); 
                    textoNode.setAttribute('dominant-baseline', 'hanging'); 
                    textoNode.setAttribute('class', 'draggable-text');
                    
                    textoContainer.appendChild(textoNode);
                    
                    const caja = textoNode.getBBox();
                    
                    if (posXActual + caja.width + margenPx > anchoLienzoPx) {
                        posXActual = margenPx;
                        posYActual += alturaFilaMaxima + margenPx;
                        alturaFilaMaxima = 0; 
                    }

                    if (posYActual + caja.height > altoLienzoPx) {
                        elementosNoCupieron++;
                        textoContainer.removeChild(textoNode); 
                        continue; 
                    }

                    textoNode.setAttribute('x', posXActual);
                    textoNode.setAttribute('y', posYActual);

                    textoNode.addEventListener('dblclick', function() {
                        textoContainer.removeChild(textoNode);
                    });

                    posXActual += caja.width + margenPx;
                    if (caja.height > alturaFilaMaxima) {
                        alturaFilaMaxima = caja.height;
                    }
                    
                    totalAcomodados++;
                }
            });

            if (elementosNoCupieron > 0) {
                statusInfo.textContent = `Acomodados: ${totalAcomodados}. NO cupieron: ${elementosNoCupieron}`;
                statusInfo.style.color = 'var(--danger-color)';
                alert(`¡Atención! El lienzo se llenó. Se acomodaron ${totalAcomodados} elementos, pero ${elementosNoCupieron} no cupieron. Puedes descargar este PNG, darle a "Limpiar Lienzo" y generar el resto.`);
            } else {
                statusInfo.textContent = `¡Éxito! ${totalAcomodados} elementos acomodados.`;
                statusInfo.style.color = 'var(--secondary-color)';
            }
        }

        // 5. Arrastrar y Soltar
        let elementoSeleccionado = null;
        let offset = { x: 0, y: 0 };

        function obtenerPosicionMouse(evt) {
            let CTM = svgWorkspace.getScreenCTM();
            return { x: (evt.clientX - CTM.e) / CTM.a, y: (evt.clientY - CTM.f) / CTM.d };
        }

        svgWorkspace.addEventListener('mousedown', function(evt) {
            if (evt.target.classList.contains('draggable-text')) {
                elementoSeleccionado = evt.target;
                let mousePos = obtenerPosicionMouse(evt);
                offset.x = mousePos.x - parseFloat(elementoSeleccionado.getAttributeNS(null, "x"));
                offset.y = mousePos.y - parseFloat(elementoSeleccionado.getAttributeNS(null, "y"));
            }
        });

        svgWorkspace.addEventListener('mousemove', function(evt) {
            if (elementoSeleccionado) {
                evt.preventDefault();
                let mousePos = obtenerPosicionMouse(evt);
                elementoSeleccionado.setAttributeNS(null, "x", mousePos.x - offset.x);
                elementoSeleccionado.setAttributeNS(null, "y", mousePos.y - offset.y);
            }
        });

        svgWorkspace.addEventListener('mouseup', () => elementoSeleccionado = null);
        svgWorkspace.addEventListener('mouseleave', () => elementoSeleccionado = null);

        // 6. Exportaciones
        function descargarPNG() {
            const anchoCm = parseFloat(anchoInput.value) || 57;
            const altoCm = parseFloat(altoInput.value) || 112;
            const dpi = 59.055; 
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(anchoCm * dpi);
            canvas.height = Math.round(altoCm * dpi);
            const ctx = canvas.getContext("2d");

            const svgData = new XMLSerializer().serializeToString(svgWorkspace);
            const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const link = document.createElement("a");
                link.download = `Corte_Automatico.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        function descargarSVG() {
            const svgData = new XMLSerializer().serializeToString(svgWorkspace);
            const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.download = `Corte_Automatico.svg`;
            link.href = url;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        window.onload = actualizarLienzo;

    </script>
</body>
</html>
