<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Gang Sheets - Nivel Industrial (PDF/PNG)</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Diseño Visual, Intuitivo y Responsivo */
        :root {
            --primary-color: #f59e0b; 
            --primary-hover: #d97706;
            --secondary-color: #10b981; 
            --secondary-hover: #059669;
            --danger-color: #ef4444; 
            --bg-color: #111827;
            --panel-bg: #1f2937;
            --text-color: #f3f4f6;
            --border-color: #374151;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
            height: fit-content;
        }

        /* Panel Izquierdo */
        .controls-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .controls-panel h2 {
            margin-top: 0;
            margin-bottom: 5px;
            color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.2rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-weight: 600; font-size: 0.85rem; color: #9ca3af; }

        .form-group input[type="text"], .form-group input[type="number"], .form-group select {
            padding: 10px; background-color: #374151; color: white;
            border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; width: 100%;
        }

        .form-group input[type="color"] {
            width: 100%; height: 40px; padding: 2px; background-color: #374151;
            border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer;
        }

        .form-group input[type="file"] {
            padding: 8px; background-color: #374151; border: 1px dashed var(--primary-color);
            border-radius: 6px; font-size: 0.85rem; color: white; cursor: pointer; width: 100%; overflow: hidden;
        }

        .dimensions-container {
            display: flex; gap: 10px; background-color: #111827; padding: 12px;
            border-radius: 6px; border: 1px solid var(--border-color);
        }
        .dimensions-container .form-group { flex: 1; min-width: 0; }

        /* Botones */
        .btn-add, .btn-auto, .btn-clear, .btn-exportar-png, .btn-exportar-pdf, .btn-exportar-svg {
            width: 100%; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: bold;
        }

        .btn-add { background-color: var(--secondary-color); color: white; padding: 12px; font-size: 0.95rem; }
        .btn-add:hover { background-color: var(--secondary-hover); }

        .btn-auto {
            background-color: var(--primary-color); color: #000; padding: 15px; font-size: 1.05rem;
            margin-top: 10px; box-shadow: 0 4px 6px rgba(245, 158, 11, 0.3);
        }
        .btn-auto:hover { background-color: var(--primary-hover); transform: translateY(-2px); }

        .btn-clear { background-color: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 10px; font-size: 0.9rem; }
        .btn-clear:hover { background-color: rgba(239, 68, 68, 0.1); }

        .btn-exportar-png { background-color: #374151; color: white; border: 1px solid #4b5563; padding: 10px; font-size: 0.9rem; }
        .btn-exportar-png:hover { background-color: #4b5563; }

        .btn-exportar-pdf { background-color: #dc2626; color: white; padding: 10px; font-size: 0.9rem; }
        .btn-exportar-pdf:hover { background-color: #b91c1c; }

        .btn-exportar-svg { background-color: transparent; color: #9ca3af; border: 1px solid #4b5563; padding: 10px; font-size: 0.9rem; font-weight: normal; }
        .btn-exportar-svg:hover { background-color: #374151; color: white; }

        .button-row { display: flex; gap: 8px; margin-top: 10px; }

        .queue-container {
            background-color: #111827; border: 1px solid var(--border-color); border-radius: 6px;
            padding: 10px; max-height: 150px; overflow-y: auto;
        }
        
        .queue-item {
            display: flex; justify-content: space-between; align-items: center; background-color: #1f2937;
            padding: 8px 10px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem;
            border-left: 3px solid var(--primary-color); word-break: break-all;
        }

        .advanced-options { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 0.85rem; color: #d1d5db; }
        .advanced-options input[type="checkbox"] { accent-color: var(--primary-color); cursor: pointer; }

        /* Panel Derecho */
        .preview-panel {
            background-color: var(--panel-bg); padding: 25px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); flex-grow: 1; display: flex; flex-direction: column; width: 100%;
        }

        .canvas-header {
            display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; align-items: flex-start; flex-wrap: wrap; gap: 10px;
        }

        .btn-clear-canvas {
            background-color: transparent; color: #9ca3af; border: 1px solid #4b5563; padding: 8px 12px;
            font-size: 0.85rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; margin-top: 8px; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-clear-canvas:hover { background-color: #374151; color: white; border-color: #6b7280; }

        .canvas-header p { margin: 0; color: #9ca3af; font-size: 0.9rem; }
        .status-message { color: var(--secondary-color); font-weight: bold; font-size: 0.9rem; display: block; margin-top: 5px; }

        .canvas-container {
            background-image: linear-gradient(45deg, #1f2937 25%, transparent 25%), linear-gradient(-45deg, #1f2937 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1f2937 75%), linear-gradient(-45deg, transparent 75%, #1f2937 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #111827; 
            border: 1px solid #4b5563; display: flex; position: relative; height: 80vh; max-height: 800px; aspect-ratio: 57 / 112; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); touch-action: none; 
        }

        #svg-workspace { width: 100%; height: 100%; display: block; }

        .draggable-piece { cursor: grab; user-select: none; touch-action: none; }
        .draggable-piece:active { cursor: grabbing; }
        .draggable-piece:hover text { opacity: 0.8; }

        /* Loader para exportaciones pesadas */
        #loader { display: none; color: #f59e0b; font-size: 0.85rem; text-align: center; margin-top: 5px; font-weight: bold; }

        @media (max-width: 1024px) {
            .app-container { flex-direction: column; }
            .controls-panel { width: 100%; }
            .canvas-container { height: auto; width: 100%; max-height: 70vh; }
            .dimensions-container { flex-wrap: wrap; }
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .button-row { flex-wrap: wrap; }
            .btn-clear, .btn-exportar-png, .btn-exportar-pdf { width: 100%; flex: none !important; }
            .canvas-header { flex-direction: column; align-items: flex-start; text-align: left; }
            .canvas-header div { text-align: left !important; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="controls-panel">
            <h2>1. Configurar Rollo</h2>
            <div class="dimensions-container">
                <div class="form-group">
                    <label>Ancho (cm):</label>
                    <input type="number" id="ancho-input" value="57" min="1" step="1" onchange="actualizarLienzo()">
                </div>
                <div class="form-group">
                    <label>Alto (cm):</label>
                    <input type="number" id="alto-input" value="112" min="1" step="1" onchange="actualizarLienzo()">
                </div>
            </div>

            <h2>2. Preparar Elementos</h2>
            
            <div class="form-group">
                <label>Texto (Número o Nombre):</label>
                <input type="text" id="texto-input" value="10" placeholder="Ej. 10 o RODRIGUEZ">
            </div>

            <div class="dimensions-container">
                <div class="form-group" style="flex: 1;">
                    <label style="color: var(--primary-color);">Cargar Fuente (.ttf):</label>
                    <input type="file" id="font-upload" accept=".ttf, .otf, .woff, .woff2">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Tipografía:</label>
                    <select id="fuente-select">
                        <option value="'Anton', sans-serif">Anton</option>
                        <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                    </select>
                </div>
            </div>

            <div class="dimensions-container">
                <div class="form-group">
                    <label>Altura FÍSICA (cm):</label>
                    <input type="number" id="alto-numero-input" value="8" min="1" step="0.5">
                </div>
                <div class="form-group">
                    <label>Color:</label>
                    <input type="color" id="color-input" value="#ffffff">
                </div>
                <div class="form-group">
                    <label>¿Cuántos?:</label>
                    <input type="number" id="cantidad-input" value="1" min="1" step="1" style="background-color: #1f2937; border-color: var(--secondary-color);">
                </div>
            </div>

            <button class="btn-add" onclick="agregarACola()">↓ Añadir a la Cola</button>

            <div class="queue-container" id="queue-list">
                <div style="color: #6b7280; font-size: 0.85rem; text-align: center; padding: 10px;">La cola está vacía</div>
            </div>

            <h2>3. Acomodo y Exportación</h2>
            <div class="advanced-options">
                <input type="checkbox" id="permitir-rotacion" checked>
                <label for="permitir-rotacion">Activar modo Tetris (rotar 90°)</label>
            </div>
            
            <button class="btn-auto" onclick="autoAcomodar()">⚡ Generar Acomodo Exacto</button>
            
            <div class="button-row">
                <button class="btn-clear" style="flex: 1;" onclick="vaciarCola()">🗑️ Borrar</button>
                <button class="btn-exportar-png" style="flex: 1;" onclick="descargarPNG()">💾 PNG</button>
                <button class="btn-exportar-pdf" style="flex: 1;" onclick="descargarPDF()">📄 PDF</button>
            </div>
            <div id="loader">Procesando archivo pesado, por favor espera... ⏳</div>
            <button class="btn-exportar-svg" style="margin-top: 10px;" onclick="descargarSVG()">💾 Guardar Vector Original (SVG)</button>
        </div>

        <div class="preview-panel">
            <div class="canvas-header">
                <div>
                    <h2 style="margin: 0;">Lienzo de Producción</h2>
                    <button class="btn-clear-canvas" onclick="limpiarLienzo()">🧹 Limpiar Lienzo</button>
                </div>
                <div style="text-align: right;">
                    <p id="medida-info">Plantilla: 57 cm x 112 cm</p>
                    <span id="status-info" class="status-message"></span>
                </div>
            </div>
            
            <div class="canvas-container" id="canvas-wrapper">
                <svg id="medidor-oculto" style="position: absolute; top: -10000px; left: -10000px; visibility: hidden;"></svg>
                
                <svg id="svg-workspace" xmlns="http://www.w3.org/2000/svg">
                    <defs id="svg-defs"></defs>
                    <g id="texto-container"></g>
                </svg>
            </div>
            <p style="color: #9ca3af; font-size: 0.85rem; margin-top: 10px; text-align: center;">* Arrastra los grupos libremente. Doble clic (o doble toque) para borrar uno.</p>
        </div>
    </div>

    <script>
        const anchoInput = document.getElementById('ancho-input');
        const altoInput = document.getElementById('alto-input');
        const svgWorkspace = document.getElementById('svg-workspace');
        const textoContainer = document.getElementById('texto-container');
        const svgDefs = document.getElementById('svg-defs');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const medidaInfo = document.getElementById('medida-info');
        const queueList = document.getElementById('queue-list');
        const statusInfo = document.getElementById('status-info');
        const medidorOculto = document.getElementById('medidor-oculto');
        const checkRotacion = document.getElementById('permitir-rotacion');
        const loader = document.getElementById('loader');

        let fuentesPersonalizadas = {};
        let colaProduccion = []; 
        const PIXELES_POR_CM = 100; 

        // 1. Configuración
        function actualizarLienzo() {
            const anchoPlantillaCm = parseFloat(anchoInput.value) || 57;
            const altoPlantillaCm = parseFloat(altoInput.value) || 112;
            medidaInfo.textContent = `Plantilla: ${anchoPlantillaCm} cm x ${altoPlantillaCm} cm`;
            
            canvasWrapper.style.aspectRatio = `${anchoPlantillaCm} / ${altoPlantillaCm}`;
            const viewBoxAncho = anchoPlantillaCm * PIXELES_POR_CM;
            const viewBoxAlto = altoPlantillaCm * PIXELES_POR_CM;
            svgWorkspace.setAttribute('viewBox', `0 0 ${viewBoxAncho} ${viewBoxAlto}`);
        }

        // 2. Cargar Fuentes
        document.getElementById('font-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evento) {
                const base64Font = evento.target.result;
                const fontName = 'Fuente_' + Math.random().toString(36).substring(7);
                fuentesPersonalizadas[fontName] = base64Font;
                
                const newStyle = document.createElement('style');
                newStyle.appendChild(document.createTextNode(`@font-face { font-family: '${fontName}'; src: url('${base64Font}'); }`));
                document.head.appendChild(newStyle);

                const svgStyle = document.createElementNS("http://www.w3.org/2000/svg", "style");
                svgStyle.textContent = `@font-face { font-family: '${fontName}'; src: url('${base64Font}'); }`;
                svgDefs.appendChild(svgStyle);
                
                const select = document.getElementById('fuente-select');
                const option = document.createElement('option');
                option.value = `'${fontName}'`;
                
                let displayName = file.name;
                if(displayName.length > 15) displayName = displayName.substring(0, 15) + '...';
                
                option.textContent = '★ ' + displayName;
                option.style.fontFamily = fontName;
                select.appendChild(option);
                select.value = `'${fontName}'`;
            };
            reader.readAsDataURL(file);
        });

        // 3. Sistema de Cola
        function agregarACola() {
            const texto = document.getElementById('texto-input').value;
            const fuenteVal = document.getElementById('fuente-select').value;
            const altoTextoCm = parseFloat(document.getElementById('alto-numero-input').value);
            const colorTexto = document.getElementById('color-input').value;
            const cantidad = parseInt(document.getElementById('cantidad-input').value) || 1;

            if (!texto) { alert("Escribe un texto o número."); return; }

            colaProduccion.push({
                id: Date.now(), texto: texto, fuente: fuenteVal,
                altoCm: altoTextoCm, color: colorTexto, cantidad: cantidad
            });
            actualizarVistaCola();
        }

        function actualizarVistaCola() {
            if (colaProduccion.length === 0) {
                queueList.innerHTML = '<div style="color: #6b7280; font-size: 0.85rem; text-align: center; padding: 10px;">La cola está vacía</div>';
                return;
            }
            queueList.innerHTML = '';
            colaProduccion.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <span><b>${item.cantidad}x</b> "${item.texto}" (${item.altoCm}cm)</span>
                    <button style="background: none; border: none; color: #ef4444; cursor: pointer; padding: 5px;" onclick="eliminarDeCola(${index})">✕</button>
                `;
                queueList.appendChild(div);
            });
        }

        function eliminarDeCola(index) { colaProduccion.splice(index, 1); actualizarVistaCola(); }
        function vaciarCola() { colaProduccion = []; actualizarVistaCola(); }
        function limpiarLienzo() {
            textoContainer.innerHTML = '';
            statusInfo.textContent = 'Lienzo en blanco.';
            statusInfo.style.color = '#9ca3af';
        }

        // 4. MOTOR DE TINTA Y EMPAQUETADO (GUILLOTINE)
        function medirTintaExacta(texto, fuente, altoDeseadoCm) {
            const altoDeseadoPx = altoDeseadoCm * PIXELES_POR_CM;
            
            medidorOculto.innerHTML = '';
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.textContent = texto;
            t.setAttribute('font-family', fuente);
            t.setAttribute('font-size', '1000px'); 
            medidorOculto.appendChild(t);
            
            const cajaBase = t.getBBox();
            const factorEscala = altoDeseadoPx / cajaBase.height;
            const fontSizeReal = 1000 * factorEscala;
            
            t.setAttribute('font-size', `${fontSizeReal}px`);
            const cajaFinal = t.getBBox();
            medidorOculto.innerHTML = ''; 
            
            return {
                texto: texto, fuente: fuente, color: '#ffffff',
                fontSize: fontSizeReal, ancho: cajaFinal.width, alto: cajaFinal.height, 
                offsetX: -cajaFinal.x, offsetY: -cajaFinal.y, area: cajaFinal.width * cajaFinal.height
            };
        }

        class GuillotinePacker {
            constructor(width, height) { this.freeRects = [{x: 0, y: 0, w: width, h: height}]; }
            pack(w, h, rotatable) {
                let bestNode = null, bestIndex = -1, rotated = false, minArea = Infinity; 
                for (let i = 0; i < this.freeRects.length; i++) {
                    let rect = this.freeRects[i];
                    if (w <= rect.w && h <= rect.h && rect.w * rect.h < minArea) {
                        bestNode = {x: rect.x, y: rect.y, w: w, h: h}; bestIndex = i; rotated = false; minArea = rect.w * rect.h;
                    }
                    if (rotatable && h <= rect.w && w <= rect.h && rect.w * rect.h < minArea) {
                        bestNode = {x: rect.x, y: rect.y, w: h, h: w}; bestIndex = i; rotated = true; minArea = rect.w * rect.h;
                    }
                }
                if (bestIndex !== -1) { this.split(bestIndex, bestNode); return { x: bestNode.x, y: bestNode.y, rotated: rotated }; }
                return null; 
            }
            split(index, placedRect) {
                let rect = this.freeRects[index];
                this.freeRects.splice(index, 1);
                let rightW = rect.w - placedRect.w, bottomH = rect.h - placedRect.h;
                if (rightW > 0 || bottomH > 0) {
                    if (rightW > bottomH) {
                        if (rightW > 0) this.freeRects.push({x: rect.x + placedRect.w, y: rect.y, w: rightW, h: placedRect.h});
                        if (bottomH > 0) this.freeRects.push({x: rect.x, y: rect.y + placedRect.h, w: rect.w, h: bottomH});
                    } else {
                        if (rightW > 0) this.freeRects.push({x: rect.x + placedRect.w, y: rect.y, w: rightW, h: rect.h});
                        if (bottomH > 0) this.freeRects.push({x: rect.x, y: rect.y + placedRect.h, w: placedRect.w, h: bottomH});
                    }
                }
            }
        }

        async function autoAcomodar() {
            if (colaProduccion.length === 0) { alert("Añade elementos a la cola."); return; }
            limpiarLienzo();
            
            const anchoLienzoPx = (parseFloat(anchoInput.value) || 57) * PIXELES_POR_CM;
            const altoLienzoPx = (parseFloat(altoInput.value) || 112) * PIXELES_POR_CM;
            const margenPx = 10; // 1 milímetro de protección
            const packer = new GuillotinePacker(anchoLienzoPx, altoLienzoPx);
            const permitirRotacion = checkRotacion.checked;

            let piezas = [];
            colaProduccion.forEach(item => {
                const piezaMaestra = medirTintaExacta(item.texto, item.fuente, item.altoCm);
                piezaMaestra.color = item.color;
                for (let i = 0; i < item.cantidad; i++) piezas.push({...piezaMaestra});
            });

            piezas.sort((a, b) => b.area - a.area || b.alto - a.alto);

            let totalAcomodados = 0, elementosNoCupieron = 0;
            piezas.forEach(pieza => {
                let result = packer.pack(pieza.ancho + margenPx, pieza.alto + margenPx, permitirRotacion);
                if (result) {
                    dibujarPiezaExacta(pieza, result.x, result.y, result.rotated);
                    totalAcomodados++;
                } else {
                    elementosNoCupieron++;
                }
            });

            if (elementosNoCupieron > 0) {
                statusInfo.textContent = `Listos: ${totalAcomodados} | Faltaron: ${elementosNoCupieron}`;
                statusInfo.style.color = 'var(--danger-color)';
                alert(`¡Material lleno al milímetro! Faltaron ${elementosNoCupieron} por acomodar.`);
            } else {
                statusInfo.textContent = `¡Tetris Perfecto! ${totalAcomodados} piezas listas.`;
                statusInfo.style.color = 'var(--secondary-color)';
            }
        }

        function dibujarPiezaExacta(pieza, x, y, rotado) {
            const gMaster = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gMaster.setAttribute('class', 'draggable-piece');
            gMaster.setAttribute('transform', `translate(${x}, ${y})`);
            gMaster.setAttribute('data-x', x);
            gMaster.setAttribute('data-y', y);
            gMaster.setAttribute('data-rotated', rotado);

            const gRotacion = document.createElementNS("http://www.w3.org/2000/svg", "g");
            if (rotado) gRotacion.setAttribute('transform', `translate(0, ${pieza.ancho}) rotate(-90)`);

            const textoNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textoNode.textContent = pieza.texto;
            textoNode.setAttribute('fill', pieza.color);
            textoNode.setAttribute('font-family', pieza.fuente);
            textoNode.setAttribute('font-size', `${pieza.fontSize}px`);
            textoNode.setAttribute('x', pieza.offsetX);
            textoNode.setAttribute('y', pieza.offsetY);

            gRotacion.appendChild(textoNode);
            gMaster.appendChild(gRotacion);
            textoContainer.appendChild(gMaster);

            gMaster.addEventListener('dblclick', function() { textoContainer.removeChild(gMaster); });
            let lastTouchTime = 0;
            gMaster.addEventListener('touchend', function(e) {
                let tapLength = new Date().getTime() - lastTouchTime;
                if (tapLength < 500 && tapLength > 0) { textoContainer.removeChild(gMaster); e.preventDefault(); }
                lastTouchTime = new Date().getTime();
            });
        }

        // 5. ARRASTRAR Y SOLTAR
        let elementoSeleccionado = null; let offset = { x: 0, y: 0 };
        function obtenerPosicionEvent(evt) {
            let cx = evt.touches ? evt.touches[0].clientX : evt.clientX;
            let cy = evt.touches ? evt.touches[0].clientY : evt.clientY;
            let CTM = svgWorkspace.getScreenCTM();
            return { x: (cx - CTM.e) / CTM.a, y: (cy - CTM.f) / CTM.d };
        }

        function iniciarArrastre(evt) {
            let target = evt.target;
            while (target && !target.classList?.contains('draggable-piece') && target.tagName !== 'svg') { target = target.parentNode; }
            if (target && target.classList?.contains('draggable-piece')) {
                elementoSeleccionado = target;
                let pos = obtenerPosicionEvent(evt);
                let currentX = parseFloat(elementoSeleccionado.getAttribute('data-x'));
                let currentY = parseFloat(elementoSeleccionado.getAttribute('data-y'));
                offset.x = pos.x - currentX; offset.y = pos.y - currentY;
            }
        }

        function duranteArrastre(evt) {
            if (elementoSeleccionado) {
                evt.preventDefault();
                let pos = obtenerPosicionEvent(evt);
                let newX = pos.x - offset.x, newY = pos.y - offset.y;
                elementoSeleccionado.setAttribute('transform', `translate(${newX}, ${newY})`);
                elementoSeleccionado.setAttribute('data-x', newX);
                elementoSeleccionado.setAttribute('data-y', newY);
            }
        }

        function terminarArrastre() { elementoSeleccionado = null; }

        svgWorkspace.addEventListener('mousedown', iniciarArrastre);
        svgWorkspace.addEventListener('mousemove', duranteArrastre);
        svgWorkspace.addEventListener('mouseup', terminarArrastre);
        svgWorkspace.addEventListener('mouseleave', terminarArrastre);
        svgWorkspace.addEventListener('touchstart', iniciarArrastre, {passive: false});
        svgWorkspace.addEventListener('touchmove', duranteArrastre, {passive: false});
        svgWorkspace.addEventListener('touchend', terminarArrastre);
        svgWorkspace.addEventListener('touchcancel', terminarArrastre);

        // ==========================================
        // 6. MOTOR DE RENDERIZADO EXTREMO (PNG y PDF)
        // ==========================================
        function renderToCanvas(callback) {
            loader.style.display = 'block'; // Mostrar loader
            
            // Damos un milisegundo para que la pantalla dibuje el texto "Cargando..."
            setTimeout(() => {
                const anchoCm = parseFloat(anchoInput.value) || 57;
                const altoCm = parseFloat(altoInput.value) || 112;
                const pxPorCm = 59.055; // Resolución Segura (150 DPI)
                
                const canvas = document.createElement("canvas");
                canvas.width = Math.round(anchoCm * pxPorCm);
                canvas.height = Math.round(altoCm * pxPorCm);
                const ctx = canvas.getContext("2d");

                const svgData = new XMLSerializer().serializeToString(svgWorkspace);
                
                // LA SOLUCIÓN AL PROBLEMA DE LAS FUENTES:
                // En vez de usar Blob, codificamos todo el código fuente en una URL nativa "Data URI".
                // Esto burla el filtro de seguridad (taint) porque el navegador lee la fuente como código seguro embebido.
                const svgBase64 = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgData);
                
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = function() {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    loader.style.display = 'none'; // Ocultar loader
                    callback(canvas, anchoCm, altoCm);
                };
                img.src = svgBase64;
            }, 50);
        }

        function descargarPNG() {
            renderToCanvas((canvas) => {
                const link = document.createElement("a");
                link.download = `GangSheet_Produccion.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        function descargarPDF() {
            renderToCanvas((canvas, anchoCm, altoCm) => {
                const { jsPDF } = window.jspdf;
                // Configurar PDF exactamente al tamaño del rollo/plantilla
                const pdf = new jsPDF({
                    orientation: anchoCm > altoCm ? 'landscape' : 'portrait',
                    unit: 'cm',
                    format: [anchoCm, altoCm]
                });
                
                // Convertimos el lienzo a imagen y la pegamos en el PDF a tamaño completo
                const imgData = canvas.toDataURL("image/png");
                pdf.addImage(imgData, 'PNG', 0, 0, anchoCm, altoCm);
                pdf.save(`GangSheet_Produccion.pdf`);
            });
        }

        function descargarSVG() {
            const svgData = new XMLSerializer().serializeToString(svgWorkspace);
            const svgBase64 = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgData);
            const link = document.createElement("a");
            link.download = `GangSheet_Vector.svg`;
            link.href = svgBase64;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = actualizarLienzo;

    </script>
</body>
</html>
